<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="white"/>
  
  <!-- Title -->
  <text x="600" y="50" font-size="40" font-weight="bold" text-anchor="middle" fill="#1F2937">
    Personal IP System Flow
  </text>
  
  <!-- Left Box - Ideas -->
  <rect x="80" y="150" width="280" height="320" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/>
  <text x="220" y="250" font-size="80" text-anchor="middle">💡</text>
  <text x="220" y="350" font-size="32" font-weight="bold" text-anchor="middle" fill="#1E40AF">Ideas</text>
  <text x="220" y="400" font-size="14" text-anchor="middle" fill="#1E40AF" font-weight="500">Concepts • Research • Proposals</text>
  
  <!-- Middle Box - Projects -->
  <rect x="460" y="150" width="280" height="320" rx="12" fill="#FED7AA" stroke="#F97316" stroke-width="3"/>
  <text x="600" y="250" font-size="80" text-anchor="middle">🔨</text>
  <text x="600" y="350" font-size="32" font-weight="bold" text-anchor="middle" fill="#92400E">Projects</text>
  <text x="600" y="400" font-size="14" text-anchor="middle" fill="#92400E" font-weight="500">Active • Development • Tracking</text>
  
  <!-- Right Box - Portfolio -->
  <rect x="840" y="150" width="280" height="320" rx="12" fill="#DCFCE7" stroke="#10B981" stroke-width="3"/>
  <text x="980" y="250" font-size="80" text-anchor="middle">🏆</text>
  <text x="980" y="350" font-size="32" font-weight="bold" text-anchor="middle" fill="#15803D">Portfolio</text>
  <text x="980" y="400" font-size="14" text-anchor="middle" fill="#15803D" font-weight="500">Case Studies • Showcase • Impact</text>
  
  <!-- Arrow 1: Ideas to Projects -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2563EB"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F97316"/>
    </marker>
  </defs>
  
  <line x1="360" y1="310" x2="460" y2="310" stroke="#2563EB" stroke-width="4" marker-end="url(#arrowhead)"/>
  <text x="410" y="290" font-size="14" font-weight="bold" fill="#1E40AF" text-anchor="middle">Plan & Develop</text>
  
  <!-- Arrow 2: Projects to Portfolio -->
  <line x1="740" y1="310" x2="840" y2="310" stroke="#F97316" stroke-width="4" marker-end="url(#arrowhead2)"/>
  <text x="790" y="290" font-size="14" font-weight="bold" fill="#92400E" text-anchor="middle">Showcase & Share</text>
  
  <!-- Bottom description -->
  <text x="600" y="570" font-size="16" text-anchor="middle" fill="#4B5563" font-weight="500">
    Transform your ideas into projects and share your best work with the world
  </text>
  
  <!-- Footer -->
  <text x="600" y="615" font-size="12" text-anchor="middle" fill="#9CA3AF">
    Personal IP | github.com/navinavin33/personal-ip
  </text>
</svg>